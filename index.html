function genP(sym,base){
  const sd=sym.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
  const v=((Math.sin(Date.now()/9000+sd)+1)/2)*.04-.02;
  return +(base*(1+v)).toFixed(2);
}
function initPrices(){STOCKS_UNIQUE.forEach(s=>{PR[s.s]=genP(s.s,s.bp);});}
function simUpdate(){
  STOCKS_UNIQUE.forEach(s=>{const d=(Math.random()*.003-.0015);PR[s.s]=+(PR[s.s]*(1+d)).toFixed(2);});
  LI=LI.map(i=>({...i,v:+(i.v*(1+Math.random()*.0008-.0004)).toFixed(2)}));
  checkAlerts();render();
}

function cP(s){const st=STOCKS_UNIQUE.find(x=>x.s===s);return PR[s]||(st?st.bp:0);}
function chg(s){const st=STOCKS_UNIQUE.find(x=>x.s===s);const base=st?st.bp:cP(s);return(((cP(s)-base)/base)*100).toFixed(2);}
function up(s){return parseFloat(chg(s))>=0;}
function fmt(n){return "&#8377;"+Number(n).toLocaleString("en-IN",{maximumFractionDigits:2});}
function gc(u){return u?"#10b981":"#ef4444";}
function gb(u){return u?"rgba(16,185,129,.1)":"rgba(239,68,68,.1)";}

function isMarketOpen(){
  const ist=new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Kolkata"}));
  const day=ist.getDay();if(day===0||day===6)return false;
  const m=ist.getHours()*60+ist.getMinutes();return m>=555&&m<=930;
}
function mktStatus(){
  const ist=new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Kolkata"}));
  const day=ist.getDay();
  const tm=ist.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",hour12:true});
  const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  if(day===0||day===6)return{open:false,msg:"&#128992; Weekend - Market Closed",tm:tm+" IST ("+days[day]+")"};
  const m=ist.getHours()*60+ist.getMinutes();
  if(m<555)return{open:false,msg:"&#9203; Pre-Market - Opens 9:15 AM",tm:tm+" IST"};
  if(m<=930)return{open:true,msg:"&#128994; NSE/BSE Open",tm:tm+" IST"};
  return{open:false,msg:"&#128992; Market Closed - Opens 9:15 AM",tm:tm+" IST"};
}

function checkAlerts(){
  let tr=false;
  alerts=alerts.map(a=>{
    if(a.tr)return a;
    const c=cP(a.s),hit=a.tp==="above"?c>=a.v:c<=a.v;
    if(hit){
      notifs.unshift({id:Date.now(),msg:"&#128276; "+a.s+": "+fmt(c)+" &#8212; "+fmt(a.v)+" target "+(a.tp==="above"?"&#8593; crossed":"&#8595; dropped")+"!",read:false,tm:new Date().toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"})});
      if(notifs.length>20)notifs.pop();
      tr=true;updBell();
      if(typeof Notification!="undefined"&&Notification.permission==="granted")new Notification("MarketPulse",{body:a.s+" target hit!"});
      return{...a,tr:true};
    }
    return a;
  });
  if(tr)document.getElementById("atab").textContent="&#128276; Alerts &#9679;";
}

function updBell(){const u=notifs.filter(n=>!n.read).length,b=document.getElementById("bbadge");if(u>0){b.style.display="flex";b.textContent=u>9?"9+":u;}else b.style.display="none";}

function spark(sym,u){
  const seed=sym.length;
  const pts=Array.from({length:30},(_,i)=>{const y=28+Math.sin(i*.65+seed)*16+Math.sin(i*.28+seed*.3)*8;return i*10+","+y;});
  const d="M "+pts.join(" L ");const col=gc(u);
  return'<svg width="100%" height="56" viewBox="0 0 300 56" preserveAspectRatio="none"><defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+col+'" stop-opacity=".28"/><stop offset="100%" stop-color="'+col+'" stop-opacity="0"/></linearGradient></defs><path d="'+d+' L 290,56 L 0,56 Z" fill="url(#sg)"/><path d="'+d+'" stroke="'+col+'" stroke-width="2" fill="none"/></svg>';
}

function rwl(){
  const q=(document.getElementById("srch")||{}).value||"";
  let fl=STOCKS_UNIQUE.filter(s=>{
    const mq=s.s.toLowerCase().includes(q.toLowerCase())||s.n.toLowerCase().includes(q.toLowerCase());
    const msec=selSec==="all"||s.sec===selSec;
    return mq&&msec;
  });
  const ms=mktStatus();
  const cb=ms.open?"":
    '<div class="closed-info">&#128992; '+ms.msg+' &mdash; Showing simulated prices (last traded basis)</div>';

  return cb+'<div class="slbl" style="margin-bottom:4px">'+fl.length+' STOCKS</div>'+ig+
    fl.map(s=>{
      const p=cP(s.s),c=chg(s.s),u=up(s.s);
      const ip=PORT.some(x=>x.s===s.s),ha=alerts.some(a=>a.s===s.s&&!a.tr);

      '<div><div class="ssym">'+s.s+(ip?'<span class="bdg held">HELD</span>':'')+(ha?'<span class="bdg balert">&#128276;</span>':'')+'</div>'+
      '<div class="sname">'+s.n+'</div><div class="smeta">NSE &bull; '+s.sec+'</div></div>'+
      '<div><div class="sprc">'+fmt(p)+'</div><div class="cpill" style="color:'+gc(u)+';background:'+gb(u)+'">'+(u?"&#9650;":"&#9660;")+Math.abs(c)+'%</div></div></div>';
    }).join("")+
    (fl.length===0?'<div style="padding:32px;text-align:center;color:#334155;font-size:13px">No stocks found</div>':"");
}

  '<div><div class="pm">P&amp;L</div><div class="pn" style="color:'+gc(u)+'">'+(u?"+":"")+'&#8377;'+Math.abs(pl).toLocaleString("en-IN",{maximumFractionDigits:0})+' ('+ppc+'%)</div></div></div></div>'+
  PORT.map(p=>{const s=STOCKS_UNIQUE.find(x=>x.s===p.s),cp=cP(p.s),pl2=(cp-p.bp)*p.q,pp2=((cp-p.bp)/p.bp*100).toFixed(2),u2=pl2>=0;
  return'<div class="pcard" onclick="openS(\''+p.s+'\')"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><div><div style="font-weight:700;font-size:15px">'+p.s+'</div><div style="font-size:11px;color:#475569">'+p.q+' shares @ &#8377;'+p.bp+'</div></div><div style="text-align:right"><div style="font-weight:800;font-size:15px">'+fmt(cp)+'</div><div style="font-size:11px;color:'+gc(u2)+';font-weight:600">'+(u2?"&#9650;":"&#9660;")+Math.abs(pp2)+'%</div></div></div>'+
  '<div class="ppnl" style="background:'+gb(u2)+'"><span style="font-size:11px;color:#64748b">Value: &#8377;'+(cp*p.q).toLocaleString("en-IN",{maximumFractionDigits:0})+'</span><span style="font-size:11px;color:'+gc(u2)+';font-weight:700">P&L: '+(u2?"+":"")+'&#8377;'+Math.abs(pl2).toLocaleString("en-IN",{maximumFractionDigits:0})+'</span></div></div>';}).join("");
}

function ral(){

  h+=alerts.map((a,i)=>{const s=STOCKS_UNIQUE.find(x=>x.s===a.s),cp=cP(a.s);
    const base=s?s.bp:cp,rng=Math.abs(a.v-base);
    const pr=rng===0?100:Math.min(100,Math.max(0,a.tp==="above"?((cp-base)/rng)*100:((base-cp)/rng)*100));
    return'<div class="alcard" style="background:'+(a.tr?"rgba(16,185,129,.07)":"rgba(255,255,255,.03)")+';border:1px solid '+(a.tr?"rgba(16,185,129,.25)":"rgba(255,255,255,.06)")+'">'+
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">'+
    '<div><div style="font-weight:700;font-size:14px">'+a.s+(a.tr?'<span class="bdg btrig" style="margin-left:6px">&#10003; HIT</span>':"")+
    '</div><div style="font-size:11px;color:#475569">'+(s?s.n:"")+'</div></div>'+
    '<div style="text-align:right"><div style="font-size:9px;color:#475569">TARGET</div><div style="font-weight:800;font-size:15px;color:'+(a.tp==="above"?"#10b981":"#ef4444")+'">'+(a.tp==="above"?"&#8593;":"&#8595;")+' '+fmt(a.v)+'</div></div></div>'+
    '<div style="display:flex;justify-content:space-between;font-size:11px;color:#475569;margin-bottom:4px"><span>Current: '+fmt(cp)+'</span><span>'+pr.toFixed(0)+'% to target</span></div>'+
    '<div class="alprog"><div class="albar" style="width:'+pr+'%;background:'+(a.tr?"#10b981":"linear-gradient(90deg,#3b82f6,#10b981)")+'"></div></div>'+
    '<button class="rmbtn" onclick="remAlI('+i+')">&#10005; Remove</button></div>';
  }).join("");
  h+='<button class="aabtn" onclick="togAF()">+ New Alert</button>';
  if(showAF){h+='<div class="aform fade"><div style="margin-bottom:8px"><div class="flbl">Stock</div><select class="fsel" onchange="af.s=this.value">'+STOCKS_UNIQUE.map(s=>'<option value="'+s.s+'"'+(af.s===s.s?" selected":"")+'>'+s.s+' — '+s.n+'</option>').join("")+'</select></div>'+
  '<div class="frow2"><div style="flex:1"><div class="flbl">Type</div><select class="fsel" onchange="af.tp=this.value"><option value="above"'+(af.tp==="above"?" selected":"")+'>&#8593; Above</option><option value="below"'+(af.tp==="below"?" selected":"")+'>&#8595; Below</option></select></div>'+
  '<div style="flex:1"><div class="flbl">Target &#8377;</div><input type="number" class="finp" placeholder="45" value="'+af.v+'" oninput="af.v=this.value"></div></div>'+
  '<button class="asbtn" onclick="addAlG()">&#128276; Set Alert</button></div>';}
  return h;
}

function rai(){
  const pre=window._aipre||"";
  if(pre){window._aipre="";setTimeout(()=>{const i=document.getElementById("aiinp");if(i)i.value=pre;},50);}
  return'<div class="aiqw"><div class="aiql">&#128161; Quick Questions:</div>'+
  ["RPOWER long-term potential?","Power sector 2026 outlook?","ADANI stocks safe to buy?","Beginner Rs5,000 invest where?"].map(q=>'<button class="aiqb" onclick="setAIQ(`'+q+'`)">&#8594; '+q+'</button>').join("")+'</div>'+
  '<div class="airow"><input id="aiinp" class="aiinp" placeholder="Gujarati / English question..." onkeydown="if(event.key===\'Enter\')doAI()"><button class="aibtn" onclick="doAI()">'+(aiLd?"...":"Ask")+'</button></div>'+
  (aiLd?'<div class="aild">&#129302; Analysis in progress...</div>':"")+
  (aiR&&!aiLd?'<div class="aired"><div class="airhl">&#129302; AI ANALYST</div>'+aiR+'<div class="airdc">&#9888;&#65039; Educational only. Not financial advice.</div></div>':"");
}

function setAIQ(q){const i=document.getElementById("aiinp");if(i)i.value=q;}
async function doAI(){
  const inp=document.getElementById("aiinp"),q=inp?.value?.trim();if(!q)return;
  aiLd=true;aiR="";render();
  try{
    const ms=mktStatus();
    const ctx="Market "+(ms.open?"OPEN":"CLOSED")+". SENSEX~82345 NIFTY~24987. RPOWER:"+fmt(cP("RPOWER"))+" RELIANCE:"+fmt(cP("RELIANCE"))+" NTPC:"+fmt(cP("NTPC"));
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:"Expert Indian NSE stock analyst. Gujarati/English mix. "+ctx,messages:[{role:"user",content:q}]})});
    const d=await r.json();aiR=d.content?.[0]?.text||"Error.";
  }catch{aiR="API error. Try again.";}
  aiLd=false;render();
}

function remAlI(i){alerts.splice(i,1);render();}
function togAF(){showAF=!showAF;render();}
function addAlG(){const inp=document.querySelector(".aform .finp");const v=inp?parseFloat(inp.value):parseFloat(af.v);if(!v)return;alerts.push({s:af.s,tp:af.tp,v,tr:false});af.v="";showAF=false;render();}

// PWA

window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();dp=e;document.getElementById("ibanner").classList.add("show");});
window.addEventListener("appinstalled",()=>document.getElementById("ibanner").classList.remove("show"));
function doInstall(){if(dp){dp.prompt();dp.userChoice.then(()=>{dp=null;document.getElementById("ibanner").classList.remove("show");});}}

const isSA=window.matchMedia("(display-mode:standalone)").matches||window.navigator.standalone;
if(isIOS&&!isSA){setTimeout(()=>document.getElementById("iosguide").classList.add("show"),2500);}
const mfData={name:"MarketPulse NSE",short_name:"MarketPulse",description:"NSE Indian Stock Market",start_url:"./",display:"standalone",background_color:"#080c16",theme_color:"#080c16",icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='80' fill='%23080c16'/%3E%3Ctext x='60' y='400' font-size='400' fill='%2310b981'%3E%E2%82%B9%3C/text%3E%3C/svg%3E",sizes:"512x512",type:"image/svg+xml",purpose:"any maskable"}]};
document.getElementById("mf").href=URL.createObjectURL(new Blob([JSON.stringify(mfData)],{type:"application/json"}));
if("serviceWorker" in navigator){const sw=`const C="mpv3";self.addEventListener("install",e=>e.waitUntil(caches.open(C).then(c=>c.addAll(["./"]))));self.addEventListener("fetch",e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match("./")))));`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:"application/javascript"}))).catch(()=>{});}
if("Notification" in window&&Notification.permission==="default"){setTimeout(()=>Notification.requestPermission(),4000);}

initPrices();render();startTicker();
setInterval(simUpdate,3500);
setInterval(()=>{const ms=mktStatus();document.getElementById("mkttime").textContent=ms.tm;document.getElementById("mktstatus").innerHTML=ms.msg;},30000);
